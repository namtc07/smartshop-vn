<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>SmartShop VN - Affiliate Bio Link</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      --card-bg: rgba(255, 255, 255, 0.05);
      --card-border: rgba(255, 255, 255, 0.1);
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --secondary: #d946ef;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --success: #10b981;
      --error: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 360px;
      font-family: 'Outfit', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      padding: 20px;
      overflow-x: hidden;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--card-border);
    }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-icon {
      width: 24px; height: 24px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: white; font-size: 14px;
    }
    .logo-text {
      font-size: 18px; font-weight: 700;
      background: linear-gradient(135deg, #fff 30%, var(--text-muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .badge {
      font-size: 11px; font-weight: 500;
      background: rgba(99, 102, 241, 0.15);
      color: #a5b4fc;
      padding: 3px 8px; border-radius: 12px;
      border: 1px solid rgba(99, 102, 241, 0.3);
    }

    /* User info chip */
    .user-chip {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.25);
      border-radius: 8px; padding: 8px 12px;
      margin-bottom: 16px; font-size: 12px;
    }
    .user-chip-label { color: var(--text-muted); margin-right: 6px; }
    .user-chip-value { color: #34d399; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-change-user {
      background: none; border: none; color: #94a3b8;
      font-size: 11px; cursor: pointer; padding: 2px 6px;
      border-radius: 4px; transition: all 0.2s;
      font-family: inherit;
    }
    .btn-change-user:hover { background: rgba(255,255,255,0.08); color: #f8fafc; }

    /* Setup screen */
    .setup-screen {
      display: none;
      text-align: center;
      padding: 8px 0;
    }
    .setup-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 22px; margin: 0 auto 12px;
    }
    .setup-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .setup-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; line-height: 1.5; }

    /* Section title */
    .section-title {
      font-size: 12px; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--text-muted);
      margin-bottom: 10px; font-weight: 600;
    }

    /* Product Preview Card */
    .preview-card {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 12px; padding: 12px;
      display: flex; gap: 12px; margin-bottom: 16px;
      backdrop-filter: blur(10px); transition: transform 0.2s ease;
    }
    .preview-card:hover { transform: translateY(-2px); }
    .product-img {
      width: 64px; height: 64px; border-radius: 8px; object-fit: cover;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .product-details { flex: 1; display: flex; flex-direction: column; justify-content: space-between; min-width: 0; }
    .product-name {
      font-size: 13px; font-weight: 500; line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      color: var(--text-main);
    }
    .product-price-row {
      display: flex; align-items: center; justify-content: space-between; margin-top: 4px;
    }
    .product-price { font-size: 15px; font-weight: 700; color: #f472b6; }
    .platform-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
    .platform-tag.shopee { background: rgba(234, 88, 12, 0.2); color: #fdba74; border: 1px solid rgba(234, 88, 12, 0.3); }
    .platform-tag.lazada { background: rgba(14, 116, 144, 0.2); color: #67e8f9; border: 1px solid rgba(14, 116, 144, 0.3); }

    /* Form */
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }
    .form-input {
      width: 100%;
      background: rgba(0, 0, 0, 0.2); border: 1px solid var(--card-border);
      border-radius: 8px; padding: 10px 12px;
      color: white; font-family: inherit; font-size: 13px;
      transition: all 0.2s ease;
    }
    .form-input:focus {
      outline: none; border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.25);
      background: rgba(0, 0, 0, 0.3);
    }
    .form-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    /* Buttons */
    .btn {
      width: 100%;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      color: white; border: none; border-radius: 8px; padding: 12px;
      font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }
    .btn:hover { opacity: 0.95; transform: translateY(-1px); box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4); }
    .btn:active { transform: translateY(1px); }
    .btn:disabled {
      background: rgba(255, 255, 255, 0.1); color: var(--text-muted);
      cursor: not-allowed; box-shadow: none; transform: none;
    }

    /* Status */
    .status-msg {
      margin-top: 15px; padding: 10px; border-radius: 8px;
      font-size: 12px; display: none; line-height: 1.4;
    }
    .status-msg.error {
      display: block;
      background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5;
    }
    .status-msg.success-card {
      display: block;
      background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.3); color: #a7f3d0; padding: 12px;
    }
    .success-title { font-weight: 600; font-size: 13px; margin-bottom: 6px; color: #34d399; }
    .result-link-wrapper { display: flex; gap: 8px; margin-top: 8px; }
    .result-link {
      flex: 1; background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px; padding: 6px 10px;
      font-size: 12px; color: #a5b4fc;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .btn-copy {
      background: rgba(255, 255, 255, 0.1); border: none; color: white;
      border-radius: 6px; padding: 6px 10px; font-size: 11px; font-weight: 500;
      cursor: pointer; transition: background 0.2s; font-family: inherit;
    }
    .btn-copy:hover { background: rgba(255, 255, 255, 0.2); }

    .loader {
      width: 16px; height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3); border-top-color: white;
      border-radius: 50%; animation: spin 0.8s linear infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">S</div>
      <span class="logo-text">SmartShop VN</span>
    </div>
    <span class="badge">KOC Extension</span>
  </div>

  <!-- [SCREEN 1] Setup: nhập bio slug lần đầu -->
  <div id="setup-screen" class="setup-screen">
    <div class="setup-icon">🔗</div>
    <div class="setup-title">Thiết lập tài khoản KOC</div>
    <div class="setup-desc">
      Nhập <strong>Bio Slug</strong> trang của bạn để đăng nhập.<br>
      Ví dụ: nếu link bio là <em>smartshop-vn.vercel.app/<strong>linh-beauty</strong></em><br>
      thì nhập <strong>linh-beauty</strong>.
    </div>
    <div class="form-group">
      <label class="form-label" for="setup-slug">Bio Slug</label>
      <input type="text" id="setup-slug" class="form-input" placeholder="vd: linh-beauty">
      <div class="form-hint">Slug là tên trang bio của bạn do admin cấp.</div>
    </div>
    <button id="btn-save-user" class="btn">
      ✅ &nbsp;Xác nhận và tiếp tục
    </button>
    <div id="setup-error" class="status-msg"></div>
  </div>

  <!-- [SCREEN 2] Main app -->
  <div id="app-screen" style="display:none;">
    <!-- User chip -->
    <div id="user-chip" class="user-chip">
      <span class="user-chip-label">👤 KOC:</span>
      <span id="chip-user-id" class="user-chip-value"></span>
      <button id="btn-change-user" class="btn-change-user">Đổi user</button>
    </div>

    <div class="section-title">Xem trước sản phẩm</div>
    <div class="preview-card">
      <img id="p-img" class="product-img"
        src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='64' height='64'><rect width='64' height='64' fill='%231e293b'/></svg>"
        alt="Product image">
      <div class="product-details">
        <div id="p-name" class="product-name">Đang lấy dữ liệu sản phẩm...</div>
        <div class="product-price-row">
          <span id="p-price" class="product-price">đ0</span>
          <span id="p-platform" class="platform-tag shopee">Shopee</span>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="affiliateUrl">Affiliate DeepLink</label>
      <input type="text" id="affiliateUrl" class="form-input" placeholder="Dán link affiliate Shopee/Lazada của bạn...">
    </div>

    <button id="btn-add" class="btn" disabled>
      <div id="btn-loader" class="loader"></div>
      <span id="btn-text">Thêm vào Bio Link</span>
    </button>

    <div id="status-box" class="status-msg"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
