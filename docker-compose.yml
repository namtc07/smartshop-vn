version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: smartshop_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smartshop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartshop_api
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/smartshop?schema=public
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - db
    entrypoint: ["/bin/sh", "/app/entrypoint.sh"]
    command: ["npm", "start"]

volumes:
  postgres_data:
